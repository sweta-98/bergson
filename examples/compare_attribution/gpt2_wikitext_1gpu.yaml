run_path: runs/compare_gpt2_1gpu
model: gpt2
overwrite: true

# Mirrors examples/prototype.py's known-good 1-GPU gpt2 setup (exp_log shows
# rho >= 0.85 at this scale). Used to validate MAGIC quality on gpt2 while the
# 8-GPU spawn/DCP path hangs under heavy GPU contention.
data:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[:1024]"
  chunk_length: 256

query:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[-1024:]"
  chunk_length: 256

distributed:
  nproc_per_node: 1

batch_size: 32
num_epochs: 1
seed: 42

num_subsets: 20
subset_strategy: random

lr_schedule:
  lr_scheduler_type: polynomial
  lr: 0.0008
  lr_start: 1.0e-6
  lr_end: 8.0e-5
  warmup_steps: 0.25
