run_path: runs/compare_pythia410m_smoke
model: EleutherAI/pythia-410m
overwrite: true

data:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[:4608]"
  chunk_length: 512

query:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[-4608:]"
  chunk_length: 512

distributed:
  nproc_per_node: 8

# Smoke: verify pipeline end-to-end on pythia-410m before scaling to full data.
# bs=16 = 2/rank, conservative for the per-doc backward step on A40 (48 GiB).
# pythia-410m is ~3.3x gpt2-124m params; bs=80 OOMed gpt2 at 160, so scale down.
batch_size: 16
num_epochs: 1
seed: 42

num_subsets: 4
subset_strategy: random

lr_schedule:
  lr_scheduler_type: polynomial
  lr: 0.0008
  lr_start: 1.0e-6
  lr_end: 8.0e-5
  warmup_steps: 0.25
