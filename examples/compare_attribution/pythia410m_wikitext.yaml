run_path: runs/compare_pythia410m_wikitext
model: EleutherAI/pythia-410m
overwrite: true

data:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[:32110]"
  chunk_length: 512

query:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[-4608:]"
  chunk_length: 512

distributed:
  nproc_per_node: 8

# Full WikiText-2 train ([:32110] holds out the last 4608 rows for queries).
# num_epochs=1 to dodge the rank-0 dataset.repeat() hang on 8 GPUs.
# batch_size=24 (3/rank) — pythia-410m's per-doc backward needs ~3-4x the
# activation memory of gpt2-124m; gpt2 fit at bs=80 (10/rank), so 3/rank for
# 410m. Bump only if the smoke shows >50% headroom.
batch_size: 24
num_epochs: 1
seed: 42

num_subsets: 20
subset_strategy: random

lr_schedule:
  lr_scheduler_type: polynomial
  lr: 0.0008
  lr_start: 1.0e-6
  lr_end: 8.0e-5
  warmup_steps: 0.25
