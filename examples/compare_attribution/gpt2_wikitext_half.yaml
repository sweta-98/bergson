run_path: runs/compare_gpt2_wikitext_half
model: gpt2
overwrite: true

data:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[:16055]"
  chunk_length: 512

query:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[-4608:]"
  chunk_length: 512

distributed:
  nproc_per_node: 8

# Half-data variant of gpt2_wikitext.yaml. train[:16055] is half of the full
# train[:32110]. Used to measure latency-vs-N (N = train doc count).
batch_size: 80
num_epochs: 1
seed: 42

num_subsets: 20
subset_strategy: random

lr_schedule:
  lr_scheduler_type: polynomial
  lr: 0.0008
  lr_start: 1.0e-6
  lr_end: 8.0e-5
  warmup_steps: 0.25
