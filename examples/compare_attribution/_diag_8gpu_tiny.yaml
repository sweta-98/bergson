# Diagnostic config: minimum-size 8-GPU MAGIC to isolate whether the hang is
# at the initial DCP save vs. something later. 256 chunks @ 64 tokens, batch
# 64 (8 docs/GPU), 1 epoch — first checkpoint should be written within seconds
# if the multi-GPU save path works.
run_path: runs/_diag_8gpu_tiny
model: gpt2
overwrite: true

data:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[:256]"
  chunk_length: 64

query:
  dataset: Salesforce/wikitext
  subset: wikitext-2-raw-v1
  split: "train[-256:]"
  chunk_length: 64

distributed:
  nproc_per_node: 8

batch_size: 64
num_epochs: 1
seed: 42
num_subsets: 4
subset_strategy: random

lr_schedule:
  lr_scheduler_type: polynomial
  lr: 0.0008
  lr_start: 1.0e-6
  lr_end: 8.0e-5
  warmup_steps: 0.25
