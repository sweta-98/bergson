# Pipeline: compute MAGIC attribution scores once (via the magic step,
# which produces runs/compare/q3_random/scores.pt as a side effect of its
# random-subset validate), then run a sorted-subset validate against
# those same scores. Replaces the legacy q3_magic_random.yaml and
# q3_magic_sorted.yaml single-block configs.
#
# Run with:
#   bergson pipeline examples/magic/compare/q3_magic.yaml

- magic:
    run_path: runs/compare/q3_random
    model: gpt2
    overwrite: true

    data:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "train"
      chunk_length: 512

    query:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "test[3:4]"
      chunk_length: 0

    distributed:
      nproc_per_node: 4
      nnode: 4

    batch_size: 256
    num_epochs: 2
    lr_schedule:
      lr_scheduler_type: polynomial
      lr: 0.0008
      lr_start: 1e-6
      lr_end: 0.00008
      warmup_steps: 0.25

    subset_strategy: random
    wandb_project: magic

- validate:
    run_path: runs/compare/q3_sorted
    model: gpt2
    overwrite: true

    scores: runs/compare/q3_random/scores.pt

    data:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "train"
      chunk_length: 512

    query:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "test[3:4]"
      chunk_length: 0

    distributed:
      nproc_per_node: 4
      nnode: 4

    batch_size: 256
    num_epochs: 2
    lr_schedule:
      lr_scheduler_type: polynomial
      lr: 0.0008
      lr_start: 1e-6
      lr_end: 0.00008
      warmup_steps: 0.25

    subset_strategy: sorted
    wandb_project: magic

- validate:
    run_path: runs/compare/q3_validate_magic_random_exclude_0
    model: gpt2
    overwrite: true

    scores: runs/compare/q3_random/scores.pt

    data:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "train"
      chunk_length: 512

    query:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "test[3:4]"
      chunk_length: 0

    distributed:
      nproc_per_node: 4
      nnode: 4

    batch_size: 256
    num_epochs: 2
    lr_schedule:
      lr_scheduler_type: polynomial
      lr: 0.0008
      lr_start: 1e-6
      lr_end: 0.00008
      warmup_steps: 0.25

    subset_strategy: random
    exclude_zero_scores: true
    wandb_project: magic

- validate:
    run_path: runs/compare/q3_validate_magic_sorted_exclude_0
    model: gpt2
    overwrite: true

    scores: runs/compare/q3_random/scores.pt

    data:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "train"
      chunk_length: 512

    query:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "test[3:4]"
      chunk_length: 0

    distributed:
      nproc_per_node: 4
      nnode: 4

    batch_size: 256
    num_epochs: 2
    lr_schedule:
      lr_scheduler_type: polynomial
      lr: 0.0008
      lr_start: 1e-6
      lr_end: 0.00008
      warmup_steps: 0.25

    subset_strategy: sorted
    exclude_zero_scores: true
    wandb_project: magic
