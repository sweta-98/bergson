# Pipeline: compute EK-FAC scores for the magic-trained model from q3_random
# against test[3:4], then run leave-k-out validation on those scores.
#
# Run with:
#   bergson pipeline examples/magic/compare/q3_ekfac.yaml

- ekfac:
    index_cfg:
      run_path: runs/compare/q3_ekfac
      model: runs/compare/q3_random/hf_model
      overwrite: true
      # GPT-2's max context length is 1024.
      token_batch_size: 1024
      # Cap batch size in docs so the bin-packer doesn't produce
      # large batches of very few tokens. This matters for EK-FAC
      # because gradients aren't compressed.
      max_batch_size: 64
      # GPT-2 uses an nn.Linear for its LM head.
      filter_modules: "lm_head"
      distributed:
        nproc_per_node: 4
        nnode: 4
      data:
        dataset: Salesforce/wikitext
        subset: wikitext-2-raw-v1
        split: "train"
        truncation: true

    hessian_cfg:
      method: kfac
      ev_correction: true

    score_cfg:
      batch_size: 1024

    preprocess_cfg:
      unit_normalize: false

    hessian_pipeline_cfg:
      query:
        dataset: Salesforce/wikitext
        subset: wikitext-2-raw-v1
        split: "test[3:4]"
        chunk_length: 0
      lambda_damp_factor: 0.1

- validate:
    run_path: runs/compare/q3_validate_ekfac_random
    model: gpt2
    overwrite: true

    scores: runs/compare/q3_ekfac/scores

    data:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "train"
      chunk_length: 512

    query:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "test[3:4]"
      chunk_length: 0

    distributed:
      nproc_per_node: 4
      nnode: 4

    batch_size: 256
    num_epochs: 2
    lr_schedule:
      lr_scheduler_type: polynomial
      lr: 0.0008
      lr_start: 1e-6
      lr_end: 0.00008
      warmup_steps: 0.25

    subset_strategy: random
    wandb_project: magic

- validate:
    run_path: runs/compare/q3_validate_ekfac_sorted
    model: gpt2
    overwrite: true

    scores: runs/compare/q3_ekfac/scores

    data:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "train"
      chunk_length: 512

    query:
      dataset: Salesforce/wikitext
      subset: wikitext-2-raw-v1
      split: "test[3:4]"
      chunk_length: 0

    distributed:
      nproc_per_node: 4
      nnode: 4

    batch_size: 256
    num_epochs: 2
    lr_schedule:
      lr_scheduler_type: polynomial
      lr: 0.0008
      lr_start: 1e-6
      lr_end: 0.00008
      warmup_steps: 0.25

    subset_strategy: sorted
    wandb_project: magic
