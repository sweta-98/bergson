# Run with `bergson examples/pipelines/hessian_then_build.yaml`

run_path: runs/hessian_then_build
steps:
  - hessian:
      hessian_cfg:
        method: kfac
      index_cfg:
        run_path: runs/example_hessian
        overwrite: true
        model: EleutherAI/pythia-14m
        token_batch_size: 1024
        data:
          chunk_length: 1024

  - build:
      index_cfg:
        run_path: runs/example_build
        overwrite: true
        model: EleutherAI/pythia-14m
        token_batch_size: 1024
        data:
          chunk_length: 1024
      preprocess_cfg: {}
