# SOURCE (approximate unrolling) pipeline. Precomputes KFAC factors at three checkpoints.
#
# Run with `bergson examples/pipelines/approx_unrolling_pythia.yaml`

steps:
  - approxunrolling:
      index_cfg:
        run_path: runs/DELETE_approx_unrolling_pythia
        # index_cfg.model is used to load the appropriate tokenizer
        model: EleutherAI/pythia-14m
        token_batch_size: 1024
        data:
          dataset: NeelNanda/pile-10k
          split: train[:1000]
          truncation: true
      hessian_cfg:
        method: kfac
        hessian_dtype: fp32
        ev_correction: true
      approx_unrolling_cfg:
        # Each entry is a full HF model ID or absolute local path. The full
        # model is loaded fresh per checkpoint (revisions are not used).
        # For a real SOURCE run, swap these for distinct training-snapshot
        # paths (e.g. `/path/to/run/step_1000`, `/path/to/run/step_5000`, …).
        checkpoints:
          - EleutherAI/pythia-14m
          - EleutherAI/pythia-14m
          - EleutherAI/pythia-14m
          - EleutherAI/pythia-14m
          - EleutherAI/pythia-14m
          - EleutherAI/pythia-14m
        segments: 3
        query:
          dataset: NeelNanda/pile-10k
          split: train[:8]
          truncation: true
